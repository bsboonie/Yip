<!DOCTYPE html>
<!-- YIP! v3.3 — Two-yip trainer | 2026-06-17 | inline bang, logo-style yip selectors, no emoji | Yip1/Yip2 selectable, pitch slider per fire, fire button. Inline mp3s. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Yip!</title>
<style>
  :root {
    --bg:#0f1419; --panel:#1a2129; --panel-2:#232d38; --ink:#eef3f7;
    --muted:#8a99a8; --line:#2c3845; --accent:#ff5a3c; --accent-soft:#ff5a3c22;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none; min-height:100vh; min-height:100dvh; }
  body { display:flex; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 16px) 18px calc(env(safe-area-inset-bottom) + 18px);
    max-width:560px; margin:0 auto; }
  header { margin-bottom:16px; }
  .wordmark { font-weight:800; font-size:72px; letter-spacing:-2px; line-height:1; }
  .wordmark span { color:var(--accent); }
  .tagline { color:var(--muted); font-size:13px; margin-top:5px; }
  .vol-warn { background:#3a2a14; border:1px solid #6b4a1f; color:#f5c878;
    border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:16px;
    display:flex; gap:10px; align-items:flex-start; }
  .vol-warn b { color:#ffd98a; }
  .card { background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:18px; margin-bottom:16px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--muted); margin:0 0 14px; font-weight:700; }
  .yips { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .yip-btn { background:var(--panel-2); border:1.5px solid var(--line); color:var(--ink);
    border-radius:12px; padding:14px 4px; font-size:64px; font-weight:800; letter-spacing:-2px;
    line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .12s, background .12s, transform .06s; }
  .yip-btn .num { color:var(--accent); }
  .yip-btn:active { transform:scale(.96); }
  .yip-btn.sel { border-color:var(--accent); background:var(--accent-soft); }
  .slider-row { display:flex; align-items:center; gap:14px; }
  .slider-val { font-variant-numeric:tabular-nums; font-weight:700; font-size:16px;
    min-width:78px; text-align:right; color:var(--accent); }
  input[type=range] { -webkit-appearance:none; appearance:none; flex:1;
    height:6px; border-radius:99px; background:var(--line); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none;
    width:28px; height:28px; border-radius:50%; background:var(--accent);
    cursor:pointer; border:3px solid var(--bg); box-shadow:0 2px 8px rgba(0,0,0,.4); }
  input[type=range]::-moz-range-thumb { width:28px; height:28px; border-radius:50%;
    background:var(--accent); cursor:pointer; border:3px solid var(--bg); }
  .pitch-help { color:var(--muted); font-size:11px; margin-top:12px; }
  .btn-test { margin-top:16px; width:100%; border-radius:12px; padding:14px;
    font-size:15px; font-weight:700; cursor:pointer; border:1.5px solid var(--accent);
    background:var(--panel-2); color:var(--accent); transition:transform .06s; }
  .btn-test:active { transform:scale(.97); }
  .fire-wrap { margin-top:auto; padding-top:8px; }
  .fire { width:100%; aspect-ratio:1.5/1; max-height:260px; cursor:pointer;
    border:2px solid var(--accent); border-radius:24px;
    background:radial-gradient(circle at 50% 38%, var(--panel-2), var(--panel) 70%, #141a21);
    color:var(--ink); font-size:72px; font-weight:800; letter-spacing:-2px; line-height:1;
    box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 0 40px rgba(255,90,60,.08);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    transition:transform .08s, box-shadow .08s, background .12s; touch-action:manipulation; }
  .fire .bang { color:var(--accent); }
  .fire small { font-size:13px; font-weight:600; opacity:.7; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted); }
  .fire:active { transform:scale(.97);
    box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 0 40px rgba(255,90,60,.15); }
  .fire.flash { animation:flash .3s; }
  @keyframes flash { 0% { box-shadow:0 0 0 4px var(--accent), 0 10px 30px rgba(255,90,60,.6), inset 0 0 60px rgba(255,90,60,.4); } 100% { box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 0 40px rgba(255,90,60,.08); } }
  @media (prefers-reduced-motion:reduce){ .fire.flash{animation:none;} *{transition:none!important;} }
</style>
</head>
<body>
  <header>
    <div class="wordmark">Yip<span>!</span></div>
    <div class="tagline">Bite-inhibition trainer for Rosie</div>
  </header>

  <div class="vol-warn">
    <span>&#128266;</span>
    <div>Phones limit how loud an app can force the speaker. <b>Turn your media volume up</b> &mdash; the button plays at the app&apos;s max output.</div>
  </div>

  <div class="card">
    <h2>1 &middot; Pick a yip</h2>
    <div class="yips" id="yips">
      <button class="yip-btn sel" data-id="1">Yip<span class="num">1</span></button>
      <button class="yip-btn" data-id="2">Yip<span class="num">2</span></button>
    </div>
  </div>

  <div class="card">
    <h2>2 &middot; Tune the pitch</h2>
    <div class="slider-row">
      <input type="range" id="pitch" min="-6" max="12" step="1" value="0">
      <div class="slider-val" id="pitchVal">0 st</div>
    </div>
    <div class="pitch-help">Slide right to raise the yip into higher puppy register. Test until it lands, then fire.</div>
    <button class="btn-test" id="testBtn">&#9654; Test</button>
  </div>

  <div class="fire-wrap">
    <button class="fire" id="fireBtn"><span class="fire-word">Yip<span class="bang">!</span></span><small>Tap to fire</small></button>
  </div>

let ctx, buffers = {}, sel = 1, pitch = 0;
const semis = s => Math.pow(2, s/12);

function audio(){
  if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}
async function decode(id){
  const ac = audio();
  if(buffers[id]) return buffers[id];
  const bin = atob(SOUNDS[id]);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  buffers[id] = await ac.decodeAudioData(bytes.buffer);
  return buffers[id];
}
async function play(){
  const ac = audio();
  const buf = await decode(sel);
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = semis(pitch);
  const g = ac.createGain(); g.gain.value = 1.0;
  src.connect(g).connect(ac.destination);
  src.start();
}

const yipsEl = document.getElementById('yips');
yipsEl.querySelectorAll('.yip-btn').forEach(b => {
  b.onclick = () => {
    sel = +b.dataset.id;
    yipsEl.querySelectorAll('.yip-btn').forEach(x => x.classList.toggle('sel', x===b));
    audio(); play();
  };
});

const pitchEl = document.getElementById('pitch');
const pitchVal = document.getElementById('pitchVal');
pitchEl.oninput = () => { pitch = +pitchEl.value; pitchVal.textContent = (pitch>0?'+':'')+pitch+' st'; };

document.getElementById('testBtn').onclick = () => { audio(); play(); };

const fireBtn = document.getElementById('fireBtn');
fireBtn.onclick = () => {
  audio();
  fireBtn.classList.remove('flash'); void fireBtn.offsetWidth; fireBtn.classList.add('flash');
  play();
  if(navigator.vibrate) navigator.vibrate(40);
};

window.addEventListener('touchstart', function once(){ audio(); decode(1); decode(2); window.removeEventListener('touchstart', once); }, {once:true});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
